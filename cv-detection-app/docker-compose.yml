version: '3.8'
services:
  backend:
    build: .
    command: python3 -m backend.main
    volumes:
      - ./:/app
    working_dir: /app
    ports:
      - "8080:8080"
    environment:
      - APP_HOST=0.0.0.0
      - APP_PORT_PREFERRED=8080
      - OLLAMA_HOST=${OLLAMA_HOST}
    depends_on: []

  frontend:
    image: node:18
    working_dir: /app/frontend
    volumes:
      - ./frontend:/app/frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
