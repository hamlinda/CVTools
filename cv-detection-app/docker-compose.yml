  backend:
    build: ./backend
    # Run the package entrypoint so the app can negotiate ports and register background tasks
    command: python -m backend.main
    volumes:
      - ./:/app
      - ./backend:/app/backend:ro
    working_dir: /app
    ports:
      - "${APP_PORT_PREFERRED:-8080}:${APP_PORT_PREFERRED:-8080}"
    environment:
      - APP_HOST=0.0.0.0
      - APP_PORT_PREFERRED=${APP_PORT_PREFERRED:-8080}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://10.0.0.192:11434}

  frontend:
    image: node:18
    working_dir: /app/frontend
    volumes:
      - ./frontend:/app/frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"

volumes: {}
